<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Pipeline placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fb"/>
    </linearGradient>
    <linearGradient id="block" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="rgba(79,70,229,0.10)"/>
    </pattern>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="40" fill="#3730a3" font-family="Google Sans, sans-serif" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="3">METHOD PIPELINE PLACEHOLDER</text>

  <!-- Helper: a row of 5 blocks centered vertically.
       Each block: 180x140, gap 30 between blocks (arrow region). Total width = 5*180 + 4*60 = 1140 -->
  <g font-family="Google Sans, sans-serif">
    <!-- Block 1: Multi-view Input -->
    <g transform="translate(30, 100)">
      <rect width="180" height="140" rx="14" ry="14" fill="url(#block)" stroke="#4f46e5" stroke-width="1.5"/>
      <g transform="translate(90, 60)">
        <rect x="-44" y="-22" width="36" height="26" rx="3" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
        <rect x="-22" y="-12" width="36" height="26" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
        <rect x="0" y="-2" width="36" height="26" rx="3" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.5"/>
      </g>
      <text x="90" y="115" fill="#1f2533" font-size="13" font-weight="600" text-anchor="middle">Multi-view Input</text>
      <text x="90" y="130" fill="#5b6478" font-size="11" text-anchor="middle">{I_t} posed images</text>
    </g>

    <!-- Block 2: Encoder -->
    <g transform="translate(270, 100)">
      <rect width="180" height="140" rx="14" ry="14" fill="url(#block)" stroke="#4f46e5" stroke-width="1.5"/>
      <g transform="translate(90, 60)">
        <circle cx="-30" cy="0" r="6" fill="#06b6d4"/>
        <circle cx="-30" cy="-18" r="6" fill="#06b6d4"/>
        <circle cx="-30" cy="18" r="6" fill="#06b6d4"/>
        <circle cx="0" cy="-9" r="6" fill="#4f46e5"/>
        <circle cx="0" cy="9" r="6" fill="#4f46e5"/>
        <circle cx="30" cy="0" r="6" fill="#a78bfa"/>
        <g stroke="#94a3b8" stroke-width="1" opacity="0.7">
          <line x1="-24" y1="-18" x2="-6" y2="-9"/>
          <line x1="-24" y1="0" x2="-6" y2="-9"/>
          <line x1="-24" y1="0" x2="-6" y2="9"/>
          <line x1="-24" y1="18" x2="-6" y2="9"/>
          <line x1="6" y1="-9" x2="24" y2="0"/>
          <line x1="6" y1="9" x2="24" y2="0"/>
        </g>
      </g>
      <text x="90" y="115" fill="#1f2533" font-size="13" font-weight="600" text-anchor="middle">Encoder</text>
      <text x="90" y="130" fill="#5b6478" font-size="11" text-anchor="middle">image features</text>
    </g>

    <!-- Block 3: 3D Representation -->
    <g transform="translate(510, 100)">
      <rect width="180" height="140" rx="14" ry="14" fill="url(#block)" stroke="#4f46e5" stroke-width="1.5"/>
      <g transform="translate(90, 60)">
        <ellipse cx="-20" cy="-5" rx="14" ry="8" fill="#06b6d4" opacity="0.55"/>
        <ellipse cx="6" cy="6" rx="16" ry="10" fill="#4f46e5" opacity="0.55"/>
        <ellipse cx="22" cy="-12" rx="10" ry="6" fill="#a78bfa" opacity="0.7"/>
        <ellipse cx="-6" cy="14" rx="12" ry="7" fill="#22d3ee" opacity="0.55"/>
        <ellipse cx="20" cy="14" rx="9" ry="5" fill="#4f46e5" opacity="0.55"/>
      </g>
      <text x="90" y="115" fill="#1f2533" font-size="13" font-weight="600" text-anchor="middle">3D Representation Φ</text>
      <text x="90" y="130" fill="#5b6478" font-size="11" text-anchor="middle">Gaussians + material</text>
    </g>

    <!-- Block 4: Differentiable Simulator -->
    <g transform="translate(750, 100)">
      <rect width="180" height="140" rx="14" ry="14" fill="url(#block)" stroke="#4f46e5" stroke-width="1.5"/>
      <g transform="translate(90, 60)" stroke="#4f46e5" stroke-width="1.4" fill="none">
        <path d="M-40 8 L-24 -10 L-4 4 L16 -14 L36 0" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="-40" cy="8" r="3" fill="#06b6d4" stroke="none"/>
        <circle cx="-24" cy="-10" r="3" fill="#06b6d4" stroke="none"/>
        <circle cx="-4" cy="4" r="3" fill="#06b6d4" stroke="none"/>
        <circle cx="16" cy="-14" r="3" fill="#06b6d4" stroke="none"/>
        <circle cx="36" cy="0" r="3" fill="#06b6d4" stroke="none"/>
        <text x="0" y="32" fill="#3730a3" font-size="11" text-anchor="middle" font-style="italic" stroke="none" fill-opacity="1">S_t(Φ, θ)</text>
      </g>
      <text x="90" y="115" fill="#1f2533" font-size="13" font-weight="600" text-anchor="middle">Diff. Simulator</text>
      <text x="90" y="130" fill="#5b6478" font-size="11" text-anchor="middle">MPM, contact, gravity</text>
    </g>

    <!-- Block 5: Diff. Renderer + Loss -->
    <g transform="translate(990, 100)">
      <rect width="180" height="140" rx="14" ry="14" fill="url(#block)" stroke="#4f46e5" stroke-width="1.5"/>
      <g transform="translate(90, 60)">
        <rect x="-40" y="-20" width="34" height="34" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.4"/>
        <rect x="6" y="-20" width="34" height="34" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
        <text x="-23" y="2" fill="#3730a3" font-size="9" text-anchor="middle">render</text>
        <text x="23" y="2" fill="#92400e" font-size="9" text-anchor="middle">obs.</text>
        <path d="M-23 18 Q0 30 23 18" stroke="#4f46e5" stroke-width="1.4" fill="none"/>
        <text x="0" y="34" fill="#3730a3" font-size="11" text-anchor="middle" font-style="italic">‖ · ‖₁ + λ·L_phys</text>
      </g>
      <text x="90" y="115" fill="#1f2533" font-size="13" font-weight="600" text-anchor="middle">Diff. Renderer + Loss</text>
      <text x="90" y="130" fill="#5b6478" font-size="11" text-anchor="middle">backprop into Φ, θ</text>
    </g>

    <!-- Arrows between blocks -->
    <g stroke="url(#accent)" stroke-width="2.5" fill="none">
      <line x1="215" y1="170" x2="265" y2="170" marker-end="url(#arrowhead)"/>
      <line x1="455" y1="170" x2="505" y2="170" marker-end="url(#arrowhead)"/>
      <line x1="695" y1="170" x2="745" y2="170" marker-end="url(#arrowhead)"/>
      <line x1="935" y1="170" x2="985" y2="170" marker-end="url(#arrowhead)"/>
    </g>

    <!-- Backward gradient arrow -->
    <g stroke="#06b6d4" stroke-width="2" stroke-dasharray="6 5" fill="none" opacity="0.85">
      <path d="M1080 250 C 800 320, 400 320, 120 250" marker-end="url(#arrowhead)"/>
    </g>
    <text x="600" y="310" fill="#0e7490" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">∂L / ∂Φ ,  ∂L / ∂θ      (joint optimization)</text>
  </g>

  <!-- Footer label -->
  <text x="600" y="345" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" letter-spacing="2">REPLACE WITH static/images/pipeline.jpg OR pipeline.pdf</text>
</svg>
