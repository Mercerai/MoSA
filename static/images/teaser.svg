<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Teaser placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#grid)"/>
  <circle cx="480" cy="270" r="280" fill="url(#glow)"/>

  <!-- Left: simulated point cloud / Gaussians -->
  <g opacity="0.95">
    <circle cx="170" cy="220" r="6" fill="#06b6d4"/>
    <circle cx="200" cy="260" r="4" fill="#22d3ee"/>
    <circle cx="150" cy="300" r="5" fill="#67e8f9"/>
    <circle cx="220" cy="200" r="3" fill="#a5f3fc"/>
    <circle cx="240" cy="320" r="6" fill="#06b6d4"/>
    <circle cx="180" cy="350" r="4" fill="#22d3ee"/>
    <circle cx="280" cy="240" r="5" fill="#67e8f9"/>
    <circle cx="130" cy="240" r="4" fill="#a5f3fc"/>
    <circle cx="260" cy="380" r="3" fill="#a5f3fc"/>
    <circle cx="320" cy="280" r="5" fill="#22d3ee"/>
    <circle cx="160" cy="180" r="3" fill="#67e8f9"/>
    <circle cx="290" cy="180" r="4" fill="#06b6d4"/>
    <circle cx="200" cy="400" r="5" fill="#a5f3fc"/>
    <circle cx="280" cy="340" r="4" fill="#67e8f9"/>
  </g>
  <text x="220" y="450" fill="#94a3b8" font-family="Google Sans, sans-serif" font-size="18" text-anchor="middle">multi-view input</text>

  <!-- Arrow -->
  <g stroke="url(#accent)" stroke-width="3" fill="none">
    <path d="M380 270 L580 270" stroke-linecap="round"/>
    <path d="M560 254 L580 270 L560 286" stroke-linecap="round"/>
  </g>
  <text x="480" y="250" fill="#a78bfa" font-family="Google Sans, sans-serif" font-size="14" text-anchor="middle" font-weight="600" letter-spacing="2">RECONSTRUCT &amp; SIMULATE</text>

  <!-- Right: deforming mesh wireframe -->
  <g stroke="#a78bfa" stroke-width="1.4" fill="rgba(167,139,250,0.08)" stroke-linejoin="round">
    <path d="M650 200 L780 180 L850 240 L800 320 L680 340 L630 270 Z"/>
    <path d="M650 200 L780 180 L800 320 L680 340"/>
    <path d="M780 180 L850 240 L680 340"/>
    <path d="M650 200 L850 240"/>
    <path d="M630 270 L800 320"/>
  </g>
  <g stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.6">
    <path d="M660 195 L795 175 L860 235 L810 325 L685 348 L625 268 Z"/>
  </g>
  <text x="745" y="450" fill="#94a3b8" font-family="Google Sans, sans-serif" font-size="18" text-anchor="middle">physics-aware 3D scene</text>

  <!-- Bottom label -->
  <text x="480" y="510" fill="#475569" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="middle" letter-spacing="3">TEASER PLACEHOLDER · REPLACE WITH static/videos/teaser.mp4 OR static/images/teaser.jpg</text>
</svg>
